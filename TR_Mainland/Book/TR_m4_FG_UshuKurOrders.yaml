text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR> To the overseer of Ushu-Kur iron mine, <BR> <BR>\r\nAll operations of the mine shall be shut down and the mine itself abandoned. All laborers shall be terminated with no pay. The guard personnel are to report back to the Hlaalu garrison in Bal Foyen for new duties. The overseer is to report back to the Hlaalu Council Manor. <br> <br>\r\nThese orders are effective immediately. <br> <br>\r\nSigned, <br>\r\nMuthsera THOLER ANDAS <br>\r\nLord of BAL FOYEN & Honorable Councilor of GREAT HOUSE HLAALU\r\n<BR>"
