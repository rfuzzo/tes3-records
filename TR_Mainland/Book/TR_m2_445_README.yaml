text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"2\" FACE=\"Magic Cards\"><BR>\r\nWell hello there! Why here. This here is everything you need to know about the Ghostfence Generator.\r\n\r\n     GLOBALS\r\n\r\nTR_Necrom_MachineState\r\nGLOBAL SHORT\r\n\r\nAffected activators:\r\nTR_i2_445_grinder (main controller)\r\n_ControlDoor (slides open in stages 5-7 to reveal _ControlPend)\r\n_ControlPend (progresses stages 5-7 to 8)\r\n_corecollision\r\n_exhaust(_2)\r\n_Fan\r\n_gear[1-3]fx\r\n_ghostfx_[1-7 / 4m / core]\r\n_Glow_A\r\n_Glow_S\r\n_Glow_V\r\n_grndfx(_2)\r\n_MachineFX_(C)0[0-3]\r\n_Orb\r\n_s[1-8]fx\r\n\r\nThe machine, and many objects in this int, are tied to this control variable. States are as follows.\r\n\r\n0 - Off\r\n1 - Regular operations (default state)\r\n2 - Overdrive, regular animation\r\n3 - Overdrive, spinning gears of death\r\n4 - Overdrive, spike rain of death\r\n5 - Overdrive shutdown accessible, regular animation\r\n6 - Overdrive shutdown accessible, spinning gears of death\r\n7 - Overdrive shutdown accessible, spike rain of death\r\n8 - Shutdown triggered\r\n9 through 13 - various stages of the shutdown animation.\r\n\r\nDo not manually set the stage to values 9 or beyond, or issues with the synchronisation of TR_Necrom_MachineTimer will occur. Activator TR_i2_445_ControlPend handles progression from stages 5-7 to 8. Activator TR_i2_445_grinder handles the progression from stage 8 through 13 and eventual shutdown to stage 0. Stages 1 through 7 can be changed to at will, as long as the shutdown sequence is not running.\r\n\r\nTR_Necrom_StairsState\r\nGLOBAL FLOAT\r\n\r\nAffected activators:\r\nTR_i2_445_CellarStairs_00 (main controller)\r\n_CellarStairs_0[1-4] (slaves)\r\n_StairFX_[1-8]\r\n\r\nA tricky global governing the spiral stair segments leading to the Core. Doubles both as a trigger (set to -1 to move down if up, set to 1 to move up if down) as well as the Z position of the controller segment. Also triggers sound effects separately from the moving elements.\r\n\r\nTR_Necrom_DoorState\r\nGLOBAL SHORT\r\nTR_i2_445_Key[A/S/V]Tracker\r\nGLOBAL SHORT\r\n\r\nAffected activators:\r\nTR_i2_445_underdoors (main controller)\r\nTR_i2_445_DummyKey[A/S/V]\r\n\r\nTracks the player's interaction with the door to the Undercroft. Can be forcefully reset to be locked by setting to 0, and forcefully set to be open by setting to 5. Note that doing so will not affect the player's inventory, so unless you know where the real keys are (T_De_UNI_NecromKey[A/S/V]), do not do this.\r\n\r\nTR_Necrom_AllowVaultEntry\r\nGLOBAL SHORT\r\n\r\nAffected activators:\r\nNone, called from dialogue\r\n\r\nSet from dialogue to record whether the Ordinators in the Vault should condone the player's presence or not.\r\n\r\nTR_Necrom_VaultPortL\r\nTR_Necrom_VaultPortR\r\nGLOBAL SHORTS\r\n\r\nAffected activators:\r\nTR_i2_445_switch\r\nTR_i2_445_switch_top\r\nTR_i2_445_templegrate\r\nTR_i2_445_vaultgrate\r\nAlso called from dialogue.\r\n\r\nDouble-duty globals that trigger the interaction between the Ordinators guarding the first gate / portcullises, the switches, and the grates. Used in both the main Fane cell and the Vault cell (both scenes reset once the player CellChanges, so there's no need to keep them separate). Set to 1 to open the relevant portcullis in the active cell.\r\n\r\nTR_i2_445_grinderangle1\r\nGLOBAL FLOAT\r\n\r\nAffected activators:\r\nTR_i2_445_grinder (main controller)\r\n_g[1-3]fx\r\n\r\nDerived from TR_Necrom_MachineTimer, partially calculated intermediate number used by the gear sound activators in their Taylor expansion for the sine/cosine calculation. Determines the angle / position of the sound activators as they rotate around the room. Could potentially be derived from TR_Necrom_MachineTimer in the script of the gear activators, but this seemed more efficient.\r\n\r\nTR_i2_445_grindertimer\r\nGLOBAL FLOAT\r\n\r\nGoverns the synchronisation of object animations and effects within the Core.\r\n\r\nAffected activators:\r\nTR_i2_445_grinder (main controller)\r\n_gear[1-3]fx\r\n_s[1-8]fx\r\n\r\nThe non-shutdown animations of _grinder last for 32 seconds. This global tracks the progress of these animations and can be called by other scripts on other objects to coincide with specific parts of the animation. Because there is no reliable way to detect from script which animation is being played, this global gets initiated directly from the machine itself, and it simply tracks time, deducting 32 seconds if it passes beyond that, which allows it to stay in sync with the animations. The shutdown sequence also uses this to shut off various particle effects. Because the shutdown animation itself is shorter, shutdown should never be initiated directly, instead TR_Necrom_MachineState should be set to 8 to trigger the shutdown after the current animation is complete, when TR_Necrom_MachineTimer passes 32.\r\n\r\nTR_i2_445_Blessing[A/S/V]\r\nGLOBAL SHORT\r\n\r\nAffected activators:\r\nTR_i2_445_Glow_[A/S/V]\r\nTR_i2_445_Relic_[A/S]...\r\nTR_i2_445_Reliquary_[A/S/V]\r\nTR_i2_445_Muatra_dummy\r\nTR_i2_445_rfx[A/S/V]\r\n\r\nSimple globals for synchronising the state of the three reliquaries and the one-time dispensing of a blessing upon activation of the relics, as well as the subsequent spellFX.\r\n\r\n     RELEVANT SCRIPTED ACTIVATORS\r\n\r\nTR_i2_445_grinder\r\n\r\nThe main ghostfence generator thing, that collects souls and converts them into energy to power the ghostfence. It has four different animations - regular operation (Idle), spinning gears of death (Idle2), spike rain of death (Idle3) and shutdown (Idle4). These are triggered by the global TR_Necrom_MachineState as described above.\r\n\r\nThe idea here is that if we ever have a boss fight in this room, the boss might use the machine as an environmental hazard for the player. The boss would move to the center of the room and either cast a series of explosions or conjure a shield, moving the player to the side of the room, after which either the gears or the spikes start threatening the player.\r\n\r\nTR_i2_445_ControlDoor\r\nTR_i2_445_ControlPend\r\n\r\nScripted to open during TR_Necrom_MachineState 5-7, and to trigger the shutdown sequence on activation.\r\n\r\nTR_i2_445_Glow_[A/S/V]\r\nTR_i2_445_Relic_[A/S]...\r\nTR_i2_445_Reliquary_[A/S/V]\r\nTR_i2_445_Muatra_dummy (weapon)\r\n\r\nContainers for relics of the Tribunal that run the machine. Also the relics themselves. Almalexia lock of hair is a placeholder, apparently people want to make a skin-skirt for her. Muatra is a scripted dummy that gives the real Muatra on activation, so that I don't have to put a script on real Muatra itself.\r\n\r\nTR_i2_445_CellarStairs_0[0-4]\r\nTR_i2_445_StairsFX(_[2-8])\r\n\r\nThe hidden stairs leading to the Core. Uses global TR_Necrom_StairsState. StairsFX produces 3D sound.\r\n\r\nTR_i2_445_gear[1-3]fx\r\n\r\nHeavily scripted sound activators that move with the spinning gears in the spinning gear animation. Movement is made using a taylor expansion on the TR_i2_445_grinderangle1 global.\r\n\r\nTR_i2_445_exhaust(_2)\r\nTR_i2_445_grndfx(_2)\r\nTR_i2_445_MachineFX_(C)0[0-3]\r\n\r\nVarious particle systems that disable/enable and/or move around based on TR_Necrom_MachineState.\r\n\r\nTR_i2_445_ghostfx_[1-7 / 4m / core]\r\nTR_i2_445_Fan\r\nTR_i2_445_Orb\r\n\r\nVarious animated meshes responding to TR_Necrom_MachineState.\r\n\r\nTR_i2_445_SealingSkull (misc item)\r\nTR_i2_445_MysteriesWorm (book)\r\nTR_i2_445_SealingGhost (creature)\r\n\r\nA scripted set of items that blocks the activation of the book, conjures a ghost on activation, and then replaces the scripted book with its proper Tamriel_Data version. Is just there for flavor, really.\r\n\r\n     RELEVANT SCRIPTED CONTAINERS\r\n\r\nTR_i2_445_rfx[A/S/V]\r\n\r\nThese produce a spell effect on activation of the Tribunal relics. They are containers because apparently OpenMW doesn't play nice with activators doing ExplodeSpell sometimes.\r\n\r\nTR_i2_445_s[1-8]fx\r\n\r\nThese move around to the relevant positions during the spike rain animation, and explode a poison spell. Are containers for the same reason as above.\r\n\r\n     RELEVANT SPELLS\r\n\r\nTR_i2_445_AyemPower\r\nTR_i2_445_SehtPower\r\nTR_i2_445_VehkPower\r\n\r\nPowers bestowed on the player after touching the relevant relic (or picking up Muatra). These are only accessible if the relevant Tribunal member is dead (or, in Vivec's case, if a not-yet-existing trigger is set).\r\n<BR>"
