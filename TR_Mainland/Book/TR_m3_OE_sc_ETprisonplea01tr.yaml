text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\n[It is an unfinished letter -- one of many. It is a mess of child-like, scribbled handwriting. Parts of the text have been struck out or made illegible by spilt ink. The writer clearly had trouble putting his thoughts into words. There are pleas directed at the Emperor, the Elder Council, the King, and the Nine Divines. A phrase recurs over and over like a refrain:]\r\n\r\n... I am not a traitor ... I am not a traitor ... I am not a traitor ... I am not a traitor ...\r\n<BR>\r\n\r\n"
