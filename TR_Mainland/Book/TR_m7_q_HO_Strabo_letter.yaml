text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nLarienna Strabo,<BR>\r\n<BR>\r\nThe revenues you are collecting in Hlan Oek are disconcertingly small. I understand this is a major stop for pilgrims on Veloth's Path. Surely mercantile activity is greater than what you report? I urge you to take greater care in collection. If this situation does not improve, I will have no choice but to come and sort out this matter in person. I await the returns for the month of Last Seed. \r\n<BR>\r\nQuintus Gallenus<BR>\r\n"
