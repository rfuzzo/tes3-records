text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nLog<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nWe have escaped yet again.  Curse those fool Indoril.  Curse them for their shortsightedness.  Do they not know that strength is needed to weather the coming storm?  Curse them and their hunting parties!  Bhaskev, Innorik, and Utomial, all lost.  They were good soldiers, and I will miss them before the end.  Yet there are still six of us.  We can yet prevail.<BR>\r\n<BR>\r\nThis cave should provide us with some time to rest, repair, and regroup.  Perhaps we may even be able to recruit a few new men.  They will be sorely needed if we are to survive another assault.  Yet, I must not show despair - the men need me to be a strong leader.<BR>\r\n<BR>"
