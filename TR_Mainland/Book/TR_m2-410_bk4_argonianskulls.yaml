text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThese two skulls belong to the Argonian heathen shamans who inspired and led the Argonian assaults on our homeland. The first was captured at the battle of Han Hloadal by the stern warriors of Great House Redoran, but the second would not be killed until the last days of the war by the skilled hunters of Great House Dres. Until the last, these barbarian shamans refused to submit to the blades of the Dunmer, and so they have been brought here, as a symbol and sign of the ultimate victory won by the Dunmer of Morrowind in the Arnesian War. \r\n<BR>"
