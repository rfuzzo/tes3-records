text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nDear Nalvyna,<BR>\r\n<BR>\r\nFirst, I do not fully agree with your assessment of %PCName. The impertinent courier had broken the seal on your letter, and so cannot be trusted with any secret messages in the future. (%PCName, if you're reading this letter as well: shame on you!) <BR> <BR>\r\nHowever, %PCName did do me a service in finding another job for Gerardus. Therefore, I have decided to withdraw my call to make him the chief clerk of the Bal Foyen port authority. Let me offer you my sincere apologies and my thanks for your most generous gift. <BR>\r\n<BR>\r\nYours,<BR>\r\nGlaucia Rumariil<BR>"
