text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\n<BR>\r\n\r\nThe 13 Blessings of Sheogorath<BR>\r\n<BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nFor Our Lord Sheogorath, without Whom all Thought would be linear and all Feeling would be fleeting.\r\n<BR>\r\nBlessed are the Madmen, for they hold the keys to secret knowledge.\r\n<BR>\r\nBlessed are the Phobic, always wary of that which would do them harm.\r\n<BR>\r\nBlessed are the Obsessed, for their courses are clear.\r\n<BR>\r\nBlessed are the Addicts, may they quench the thirst that never ebbs.\r\n<BR>\r\nBlessed are the Murderous, for they have found beauty in the grotesque.\r\n<BR>\r\nBlessed are the Firelovers, for their hearts are always warm.\r\n<BR>\r\nBlessed are the Artists, for in their hands the impossible is made real.<BR>\r\nBlessed are the Musicians, for in their ears they hear the music of the soul.<BR>\r\nBlessed are the Sleepless, as they bask in wakeful dreaming.<BR>\r\nBlessed are the Paranoid, ever-watchful for our enemies.<BR>\r\nBlessed are the Visionaries, for their eyes see what might be.<BR>\r\nBlessed are the Painlovers, for in their suffering, we grow stronger.<BR>\r\nBlessed is the Madgod, who tricks us when we are foolish, punishes us when we are wrong, tortures us when we are unmindful, and loves us in our imperfection.<BR>\r\n"
