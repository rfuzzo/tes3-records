text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><DIV ALIGN=\"LEFT\"><BR>The warrior-poet appeared as a visitation in the ancestor alcove of House Mora, whose rose-worn prince of garlands was a hero against the northern demons. Vivec congregated with the bones. He said:\r\n'A scavenger cannot acquire a silk sash and expect to discover the greater systems of its predecessor: perfect happiness is embraced only by the weeping. Give me back (and do so freely) what is barren of my marriage and I will not erase you from the thought realm of God. Your line has a notable enchantress that my sister Ayem is fond of and from her murky wisdom alone do I condescend to ask.' <br>"
