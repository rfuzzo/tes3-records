text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\n<BR>\r\nSomething about this place puts me on edge but finding it was a godsend. We are close enough to the highway that getting here is no issue. Also, those superstitious natives think the place is cursed or something. That just means we are less likely to get unwanted visitors.<BR>\r\n<BR>\r\nIt would be a lot nicer if Falvard was not keeping me up at night with his digging down the hall. I keep hearing that damn Nord moving around down there. He says he was not digging last night but I know he's lying. He thinks there might be something valuable to be found from this Divines-forsaken place. If he does manage to clear the passage, at least we will have more room to spread out. Maybe then I can sleep.<BR>"
