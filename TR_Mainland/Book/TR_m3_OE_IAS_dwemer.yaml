text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThe Dwemer Collection <BR> <BR>\r\n<DIV ALIGN=\"CENTER\">\r\nThe Dwarven people of Morrowind, also known as the Dwemer, are equally known for their ingenious mechanical contraptions and their mysterious blink-of-an-eye extinction in the eighth century of the First Era.<BR> <br> The many items in the collection, which include parts of defunct automatons, everyday items, and the statue of an unidentified Dwarven king (presumably not life-sized), have been brought from the city of Kemel-Ze in the Telvannis District where the Archaeological Society is carrying out its most important excavation in Morrowind commissioned by the Elder Council. <br> <br> "
