text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nGreat Heroes of the War of the First Council<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nCompiled by Faryn Baras<BR>\r\n<BR>\r\nThis can only be described as a meager attempt at listing the heroes of the War of the First Council. So great were their ranks, so numerous their inspiring deeds, it would take this era and the next to list them all. Through their dedication to long-held traditions, they won the greatest victory of our history. It is with their sacrifices that our nation and faith have prospered to this day.<BR>\r\n<BR>\r\n<BR>\r\nLord Indoril Nerevar<BR>\r\n<BR> Greatest war leader of  the history of our people, he fought back Nord invaders and guided Morrowind into a golden age of peace and prosperity. The alliance he built was not destined to last, however, and there came a time when the Houses divided into the five Orthodox Houses - Indoril, Dres, Redoran, Telvanni, and Hlaalu, and the two Secular Houses - Dwemer and Dagoth. Soon it became clear that the profane practices of the Secular Houses were too great a danger and blight to be allowed to exist in the lands of Veloth. As Hortator, Nerevar gathered the people together under the banner of Almsivi, and struck down the blasphemers at the Battle of Red Mountain. He personally rid our sacred homeland of the foul, insidious leaders of the Secular Houses, and in doing so, sacrificed his life to bring salvation to his people. \r\n<BR>\r\nGenerals of the Great War\r\n<BR>\r\nGeneral Indoril-Triffith - Valiant General of the Indoril Army, General Triffith fought alongside Nerevar. His valiant deeds should be held as an inspiration to all faithful Dunmer. So dedicated was he to a pure Dunmer nation, he personally saw that Morrowind was purged of the traitorous House Dagoth's stain. Though wishing at first to slaughter its ranks completely, he was swayed to great mercy in sparing the youth of the Sixth House. For the rest of his life Triffith continued to serve his people and the Tribunal with diligence until his peaceful death on the island of Gorne. His spirit now serves to power the Great Ghostfence of Vvardenfell, protecting his beloved homeland even after death. <BR>\r\n<BR>\r\nGeneral Redoran-Voril - A brave and valiant leader who led warriors of his house alongside the Indoril. After defending western Morrowind from Nord barbarians, he led the Redoran host at Red Mountain. Voril passed away forty years later due to disease but spent those four decades strengthening the Temple in the lands of the Redoran. This dedication saw that faith in the Tribunal would always be held strong by his House.<BR>\r\n<BR>\r\nCouncilor Hlaalu-Nothernas - As the main leader of House Hlaalu he possessed a crafty mind. Though not fighting directly in battle, his advice proved to be decisive in waging the holy war. As a role model for compassion and mercy, he sought that both were given to the defenseless children of House Dagoth. <BR>\r\n<BR>\r\nGeneral Dres-Daryn - Daryn learned the arts of war when raiding the northern jungles of Argonia. He used this knowledge to serve the will of Almsivi, leading his mounted Dres riders to battle against the Secular Houses. He concentrated all his will on cleansing Morrowind of their depravities. In a noble sacrifice, he died while single-handedly fending off an onslaught of House Dwemer warriors, giving his soldiers a chance to escape slaughter. <BR>\r\n<BR>\r\nGeneral Dres-Saril - Saril took command of the forces of House Dres after the martyrdom of General Daryn. Guided by his faith, he led a small assembly of elite Dres warriors at Red Mountain. After victory had been won, Saril took two orphans of the Sixth House into his own family. With his firm resolve as guidance, they overcame their profane heritage and grew to be virtuous Dunmer. Later in his life, Saril continued to serve his House with honor as a councilor. <BR>\r\n<BR>\r\nLord Telvanni-Athryn - Lord Athryn, though a powerful Telvanni wizard, put the defense of Morrowind before all other concerns. His mastery of destruction magicks proved significant when he helped repulse an invading horde from the Dwemer city of Kemel-Ze that had threatened Telvanni lands and the sacred city of Necrom. On the battlefield he obliterated Dwemer constructs with mere waves of his hand. Two centuries after the war, at the age of nine hundred years, he passed away in his long-lost tower of Tel Athryn.<BR>\r\n<BR>\r\n<BR>\r\nNoteworthy Commanders\r\n<BR>\r\nCommander Garol Rael - A faithful officer under General Indoril-Triffith himself, Commander Rael served the most valiantly of any commander throughout the Houses. He fought alongside the General in the last Battle of Red Mountain, slaying many among the ranks of Dwemer and Dagoth.<BR>\r\n<BR>\r\nCommander Duloril Morvayn - Known as the Peacemaker, Commander Morvayn of House Indoril led her host to great deeds with minimal loss of life. She held each of her soldiers' lives sacred.<BR>\r\n<BR>\r\nCommander Dels Toval - Known as a father to all who served under him, Dels Toval's dedication was an inspiration to those in his company. His death during the defense of Ald'ruhn was mourned by all of House Redoran. <BR>\r\n<BR>\r\nCommander Enea Gneren - Gneren was the most skilled archer in Morrowind before her death. With the divine will of Almsivi guiding her aim, she slew the Dwarf-General Rvdorik at the fortress of Nchuleftingth, sending an arrow through his throat from across the battlefield. Serving as a dutiful teacher to her soldiers, she passed her skills onto them. By war's end they were known as greatest sharpshooters throughout the Houses.<BR>\r\n<BR>\r\nCommander Selvil Areloth - Inspired by the deeds of Vivec, he led his company of House Redoran spearmen with daring leadership and perished at Red Mountain assaulting a Dwemer tower.<BR>\r\n<BR>\r\nCommander Altis Varam - A dedicated son of House Redoran, Varam fought the Nords in Western Morrowind and fell in battle shortly after the Battle of Red Mountain. <BR>\r\n<BR>\r\nLord Aruhn - Residing in the tower of Tel Aruhn, he directed his mages in many great victories and helped push the Dwemer from the east coast of Vvardenfell. <BR>\r\n<BR>\r\n<BR>\r\n[The text goes on to honor other notable warriors and their heroic deeds.] <BR>\r\n\r\n\r\n"
