text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nExcavation Log<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\n[This appears to be some sort of log or journal depicting the excavation operations being conducted by the sorcerers in this cave.]<BR>\r\n<BR>\r\nDay Seven<BR>\r\n<BR>\r\nWhile exploring the cavern, we have stumbled upon what appears to be the ruins of a hut. By the workings of the stone and the patterns on the roof, we have determined the hut to be an ancient Chimer dwelling! If this is true, there must be a larger set of ruins nearby. The passage from this room seems to be blocked and underwater. However, I am optimistic because the discovery of these ruins will bring us fortunes and riches! Richer than we would ever be with those damn Telvanni!\r\n<BR>\r\nDay Ten\r\n<BR>\r\nSamus has brought some Argonian slaves from the market. Excellent. Just what we need: a few workers. Their ability to swim and breathe underwater will prove useful when digging through those tough underwater passages. I have immediately set them to work digging out the passage. Hopefully, within the next few days, we will find more huts, and possibly a larger ruin beyond that.<BR>\r\n<BR>\r\nDay Twenty-Five<BR>\r\n<BR>\r\nProgress is slow. The rocks seem to be made of pyrite. This rock is so hard, it breaks the picks of our slaves. However, this venture must continue. Today, our workers found the ruins of another hut. A close inspection shows that this hut is similar in structure to the one we found earlier. There should be another hut somewhere down the passage, and possibly an entrance to the interior of the structure.\r\n<BR>\r\nDay Thirty-Seven<BR>\r\n<BR>\r\nDamn those Argonians! This morning, one of them managed to escape their pens! His name was Short-Leg. Short work we made of him too. He did not make it farther than the waterfall chasm. We dumped his worthless corpse into the pool for the slaughterfish. This will teach those n'wahs not to mess with us. We have also doubled their shifts to speed up progress on the tunnel. That will make them think twice before attempting such escapes again.\r\n<BR>\r\nDay Forty-Five<BR>\r\n<BR>\r\nElindale has complained to me about the slow progress. I explained to her it was because of those Argonians, but she wouldn't listen! She has threatened to abort the excavation if it does not yield any feasible results by month's end. In order to increase efficiency, I am offering means only to those who actually do some work!\r\n<BR>\r\nDay Forty-Nine<BR>\r\n<BR>\r\nSuccess! We have found another structure in the lower passage. It seems to be a fort, clearly indicating some sort of ancient Chimer fortress. However, we have yet to find an entrance to the ruin. Hopefully, the next couple of days will be luckier than the ones we have had so far....\r\n<BR>\r\nDay Fifty-Three<BR>\r\n<BR>\r\nDamn! One of the caverns has collapsed on us! Three of the workers were killed, and we lost some valuable working space. The cavern seems to be unstable. These elusive ruins seem to want to hide something from us.\r\n<BR>\r\nDay Sixty<BR>\r\n<BR>\r\nI have decided to not re-excavate the collapsed cavern. Such a venture would prove futile and be a waste of labor. There must be some other way into the ruins. I have ordered the slaves to dig another tunnel downward and underwater. Hopefully this time, we will see some results.\r\n<BR>\r\nDay Seventy-Six<BR>\r\n<BR>\r\nWe have found the ruins of what seems to be a dome-like structure. These are common in large Chimer structures. It is known that larger ruins have multiple structures in their exteriors. We are certainly onto something big. If only the conditions were better....\r\n<BR>\r\nDay Eighty-Four<BR>\r\n<BR>\r\nThose damned Argonians! Once again, they have shown their incompetence. Today, two of them died in a hunger strike. Let those n'wahs starve, for all I care. I just want what's in that structure... I WANT IT ALL.\r\n<BR>"
