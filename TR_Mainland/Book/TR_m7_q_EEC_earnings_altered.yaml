text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\n<BR>\r\nFree Traders and Honorable Merchants of the Exchange,<BR>\r\n<FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\n<BR>\r\nBy order of the Board of Directors, I present the East Empire Trading Company's earnings statement for this financial period.<BR>\r\nWe must unfortunately report that revenues have sharply declined over this period. Our trade operations continue to collapse across the provinces.<BR>\r\nOur operations in Argonia have been completely cancelled due to lack of interest. Trade routes through the Black Marsh have become overrun with bandits, and unfortunately most of the bandits appear to be Argonian.<BR>\r\nRegarding piracy concerns, we assure investors that our ships are still seaworthy despite unfortunate encounters with pirates in the Abecean Sea. Our security measures have proven completely inconsequential in addressing such threats. The company's fleet of vessels has dwindled to only a few rowboats with significant losses to report.<BR>\r\nThankfully, recent unrest in Cyrodiil City has led the Board to suspend its weekly meetings indefinitely. Productivity has not suffered; no one really paid attention to them anyway.<BR>\r\nFinancial reserves are sufficient to meet all current gambling debts. Our debt position remains untenable with all payments to creditors being made in the form of IOU's.<BR>\r\nWe project an unknown level of stability for the next quarter, as the fortune teller appeared drunk. Your continued investment is greatly appreciated.<BR>\r\n<IMG SRC=\"TR\\tr_eec_seal.dds\" WIDTH=\"100\" HEIGHT=\"100\">\r\n<FONT COLOR=\"500000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nyr. obt. srvt.<BR>\r\nAlaisa Belliena<BR>\r\nSecretary to the Treasurer of the East Empire Company in Cyrodiil City\r\n<BR>\r\nOfficer of the East Empire Company<BR>\r\n<BR>\r\n"
