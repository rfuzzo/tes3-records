text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\n<DIV ALIGN=\"LEFT\"><BR>\r\nMy Dearest Sadryn,<BR>\r\n<BR>Why chase hawks when only cliff racers soar overhead? However brave you may be in your old age, your mind has grown weak, and I fear for your safety. I begged her not to go, but your daughter donned the pilgrims robes and headed east. Saveri's promise of delivering this letter eased my trepidations, if only slightly. But more importantly, my husband, I beg you to look down and hold in your palm the amulet that hangs from your neck. Even in your weakened state, I trust with all my heart you know its significance. If you should forget, your family will surely fall apart, and I will die a lonesome crone. I pray that my words, your amulet, and our daughter's face will give you the strength to remember where you belong. Veloth knows not the difference between those who lose their way and those who turn back.\r\n<BR>Love,<BR>\r\nRiina\r\n<BR>"
