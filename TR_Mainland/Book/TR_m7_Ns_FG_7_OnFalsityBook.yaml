text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nOn Falsity<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nThis is the secret which unfolds with the first breath.<BR>\r\n<BR>\r\nThere is a mask like a no-face. It is closed. It is like a curved smile.<BR>\r\n<BR>\r\nA tongue is a not-leash. A tongue walks ever backwards.<BR>\r\n<BR>\r\nBehold the stone mirrors. Behold the sky mirrors.<BR>\r\n<BR>\r\nThree are the flame-tongues that are called BO-ETH-IAH.<BR>\r\n<BR>\r\n"
