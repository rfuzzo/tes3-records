text: "To the %PCRace who set me free,<p>\r\n\r\nMaybe you didn't notice my plan. I left this note on Gweiwen's corpse to explain my actions. With my dagger gone, I had to use other means to kill her. It wasn't easy, slowly strangling her. I just wanted to reach Argonia and settle there without always looking over my shoulder.<p>\r\n\r\nI didn't take anything from Gweiwen. It's all yours if you want it.\r\n\r\nLong-Are-Days<p>"
