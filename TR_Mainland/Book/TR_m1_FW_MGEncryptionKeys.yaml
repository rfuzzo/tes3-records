text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nMORNING\r\n<BR><BR>\r\nONE FINE MORNING\r\nI WILL RIDE OUT WITH THE SKELETONS\r\nIN A KIND OF SILENCE\r\nTHE CURTAIN RISES AND BURNS IN THE MORNING SUN\r\nAND THE MOUNTAINS BOW DOWN\r\nWHEN THE WORLD TURNS COLD\r\nAND THE WORLD TURNS BLACK\r\n<BR><BR><BR><BR>\r\nGHOST\r\n<BR><BR>\r\nI TOOK A WALK TO THE SUMMIT AT NIGHT\r\nTO BURN A HOLE IN THE GRIP OF THE FAMILIAR\r\nTHE DARK WAS OPENING WIDE\r\nUNDER A MASK OF VERMILLION RULING EYES\r\nIT GLOWS WITH GATES OF GOLD\r\n<BR><BR><BR><BR><BR>\r\n<BR>\r\n<BR>\r\nSLEEP\r\n<BR><BR>\r\nBROKEN SLEEP IS ALL TOO REAL\r\nA MALADY GAZING THROUGH\r\nWHEN I DREAM A DREAM\r\nSHAPES OF SMOKE GROW LIKE TITANS\r\nTWISTED ROPE DEFIES ALL I KNOW\r\nSEA OF TREES HANG LIKE LEAVES FROM THE WILLOW\r\nWOULD YOU LEVEL ME WITH A DREAM\r\nI WILL FALL IN THE DARK\r\n<BR><BR><BR><BR><BR>\r\n<BR>\r\nWOODS\r\n<BR><BR>\r\nI TOOK A JOURNEY TO THE UNKNOWN\r\nI CAME BACK CHANGED TO MY BONES\r\nTHERE ARE FORCES THAT OUR EYES CANNOT SEE\r\nTHE DARKNESS HAS A HOLD ON ME\r\nHOW LONG HAVE I BEEN AWAY\r\nHAS IT BEEN AGES OR ONLY DAYS\r\nTHERE IS NO LANGUAGE FOR WHAT I HAVE SEEN\r\nTHE TRUTH IS STRANGER THAN ALL MY DREAMS\r\n<BR><BR>"
