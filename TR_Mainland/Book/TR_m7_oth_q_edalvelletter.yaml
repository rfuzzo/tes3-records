text: "<DIV ALIGN=\"Left\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nHonorable Melur Beloth,<BR>\r\n<BR>\r\nI have received information that I believe may be of great value to you. One of the slaves at the plantation you oversee, Abeek-Jah, is in secret communication with the local abolitionist group. I have intercepted their messages and believe they are preparing for a break-out. Do what you want with that information, but remember that my help is never free.<BR>\r\n<BR>\r\nFrelene Telvys<BR>"
