text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nMuthsera Gondoril,<BR>\r\n<BR>\r\nMy greatest appreciations for returning my amulet to me. I was most concerned when I discovered that it had been lost!<BR>\r\n<BR>\r\nKnow that you will always be welcome to visit the Tilmeth Manor. My husband and I are always keen to get to know the people of Meralag. For now though, I hope this reward will suffice to express my gratitude.<BR>\r\n<BR>\r\n<BR>\r\nLady Indoril Denara Tilmeth<BR>\r\n<BR>"
