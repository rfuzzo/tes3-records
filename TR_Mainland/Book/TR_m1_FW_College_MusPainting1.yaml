text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThe Shoals of Septimia<BR> <BR>\r\n<DIV ALIGN=\"LEFT\">\r\n'The Shoals of Septimia' was painted in 311 by the late Ato artist Claudia Verneti. Like many ships of the invasion force, the Imperial warship TEM Vasi Hadrach ran aground in 289 on the jagged rocks that form the treacherous straits off Septimia. Fifty-one ships of the Far East Fleet were lost during the three years of the Akaviri invasion. Of these, sixteen were destroyed in the dangerous waters immediately off the landing site at Septimia.<BR>"
