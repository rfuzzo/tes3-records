text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nCompiled Reports on the Ikinammassu Shrine <BR><BR>\r\n<DIV ALIGN=\"LEFT\">\r\n<BR>\r\n<BR>\r\nUnder the authority of Blessed Almalexia and at the behest of Ordinator Grandmaster Ilaru Daras of Almas Thirr, we been granted access to Ikinammassu, in the interests of studying and guarding against its profane influences. May Almsivi guide our steps.\r\n<BR>\r\n<BR>\r\nReport One<BR>\r\n<BR>\r\nThe inquiries into the Ikinammassu site began when several pilgrims came to the Almas Thirr Monastery claiming that the Ikinammassu shrine was the location of something strange and quite possibly dangerous, involving powers beyond all comprehension. Though the ways of the Daedra are frequently said to be beyond the ken of mere novices, and fright taken by the old Daedric ruins in Aanthirin is not uncommon, Grandmaster Daras deemed it necessary to authorize a detachment to be sent to Ikinammassu immediately. This company's first objective was to assure the safety of the local Velothi by cleansing any unsavory presence from its interiors. Their second objective was to inquire further into the nature of the strange power witnessed by the pilgrims.\r\n<BR>\r\n<BR>\r\nReport Two<BR>\r\n<BR>\r\nUpon arrival, our company first noted that the Shrine was completely devoid of hostile entities as well as largely destroyed, presumably by natural processes. We set upon clearing the rubble and strengthening the collapsing walls and ceilings to prevent any untoward events involving rockfalls. After a week of hard labor, we were able to establish a base camp within the site itself and begin our inquiries into the strange power cited in Almas Thirr's report.<BR>\r\n<BR>\r\nWe have not been able to discern which Daedric Prince this shrine was dedicated to, as the main statue has been broken beyond recognition, and there are no other clues to be found that relate to the original purpose of the site. However, among the rubble, we have found a series of peculiar fragments of stonework that emit a pulsating and otherworldly power when handled. It is possible these emanations are what frightened the pilgrims. However, more than a cursory glance at the objects was required to divine their properties, and it is unclear what the pilgrims were doing to be able to perceive this power. An inquiry by the Ministry of Truth may be necessary.<BR>\r\n<BR>\r\nReport Three<BR>\r\n<BR>\r\nWe have analyzed the fragments found during our initial excavation, and they do indeed have some very interesting properties. We can detect a faint link to the planes of Oblivion upon them, but we haven't been able to decipher whether this link is due to the makeup of the stone itself, or to the strange carvings upon it. Weathering or perhaps intentional defacing has obscured the markings to the point that they are illegible.<BR>\r\n<BR>\r\nDuring our subsequent surveys of the ruin, we also discovered the desecrated remains of a structure that appears to be integral to the purpose of the shrine. It is still unknown what this purpose is : the original form of this structure has been impossible to ascertain, although all members of our company have felt the emanations of the same, faint power that we have determined to be a link to the realms of the Daedra. <BR>\r\n<BR>\r\nReport Four<BR>\r\n<BR>\r\nFurther investigations suggest that the strange structure noted in Report Three was not built, but instead carved out of the bedrock of the surrounding locale. If this is indeed the case, then we could surmise that the entirety of the Ikinammassu shrine was built in this location to benefit from the properties of this peculiar stone. If we could discover to which plane of Oblivion this stone has been linked, we could further deduce which Daedric Prince was worshipped by the ancient residents of Ikinammassu. To ensure that no Velothi from the nearby villages have been misled by any Daedra not specifically sanctioned by the holy Tribunal, ascertaining the identity of the Daedric Prince of Ikinammassu has become our utmost priority.<BR>\r\n<BR>\r\nReport Five<BR>\r\n<BR>\r\nWe have tried multiple techniques to analyze the stone's purported link to Oblivion, and even to sever this link, but all to no avail. A conjuration spell cast by Novice Alavar shed only a little light on the subject : although Alavar's spellcasting abilities and most particularly her choice of spells are questionable, even she was able to summon a scamp into the site before the Ordinators put it down. This success implies that the veils between Oblivion and our world are indeed very thin in this location and may warrant further study.<BR>\r\n<BR>\r\nReport Six<BR>\r\n<BR>\r\nIn summary of our preliminary reports on the inquiry headed by Grandmaster Daras, we have determined that the Ikinammassu site in and of itself represents no danger for the local Velothi, although there is an obvious need for it to be kept under close supervision. Furthermore, the power inherent in the stone of the site could be utilized and mined for Temple purposes, as we are indeed convinced this stone provides the Temple a unique opportunity with which to study Daedra in such a manner that could be used to improve upon our techniques of battling them, should that need ever arise in the Indoril heartland. Therefore, we have officially requested the authorization to practice summoning Daedra in what could be termed a controlled environment here at the Ikinammassu shrine. We are sending requisition orders to provide us with scrolls of conjuration and potions of magicka to further our aims and that of the holy Tribunal and their servants.\r\n<BR>\r\n<BR>\r\nWe remain, ever faithful, the servants of Blessed Almalexia and her brethren. May Almsivi guide our walks.\r\n<BR>"
