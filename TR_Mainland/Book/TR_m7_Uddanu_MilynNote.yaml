text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nI've heard your complaint, Milyn, and since you had proven yourself useful to the Boss, I'll let him know. Gonna warn you in advance, though. The Boss seems to keep the Devourer under his control. He wants the creature to kill, the creature kills. Now, your job is to keep the prisoners in line until they depart to Massunat. The Devourer and any trouble he could yield is not your responsibility -- just keep on doing your job.<BR>\r\n<BR>\r\nDrenus will hand you this note -- too busy to meet you in person.<BR>\r\n<BR>\r\nOrchengar<BR>\r\n"
