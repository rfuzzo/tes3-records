text: "<BR>\r\n<DIV ALIGN=\"CENTER\">\r\nBOUNTY NOTICE:\r\n<BR>\r\n<DIV ALIGN=\"left\">\r\nBy order of Indriri Veram, Redoran Lawman of Uman, and under the authority of the Ruby Throne,\r\n<BR>\r\nLet it be known that the criminals\r\n<BR>\r\n<DIV ALIGN=\"center\">\r\nDRUNNA FIRE-EATER AND GEIRFINNA THE DESTROYER\r\n<BR>\r\n<DIV ALIGN=\"left\">\r\nare wanted dead for the crimes of unlawful summoning, brigandry, and murder.<BR>\r\n<BR>\r\nReward is 700 septims. Report to Indriri Veram at the Hound's Rest Inn in Uman for more information.\r\n<BR>"
