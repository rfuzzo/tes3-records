text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nAjira's good friend Bribanne, <BR>\r\n<BR>\r\nAjira apologizes for not writing sooner, but she has been very busy collecting samples and studying the various flowers and mushrooms of Vvardenfell. But after all this time, Ajira has good news to tell: Ajira has been promoted to Journeyman! \r\n<BR>\r\nAjira would like to visit, but there is much work to be done here in Balmora. Ajira needs to keep working hard to prove she deserves her promotion. Perhaps Bribanne could come to Balmora some day instead. She is always welcome here.\r\n<BR>\r\nBribanne's good friend, <BR>\r\n<BR>\r\nAjira\r\n<BR>"
