text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nTOP SECRET!<BR>\r\n<BR>\r\nThis is an advance copy and not official!<BR>\r\n<BR>\r\nYou are ordered to cordon off the area inside the walls of the town of Helnim, search out known members of the organization commonly referred to as Thieves Guild and arrest them. In accordance with this order You will:<BR>\r\n1) Close the northeastern, southeastern and western gates. Crossing the gates is prohibited except for members of the Militia until the blockade is raised again by Knight Protector Caedan Jorval in written form.<BR>\r\n2) Man the towers and send forth patrols in wartime strength. Crossing the walls or gates must be prevented by all means; measures according to wartime regulations are permitted.<BR>\r\n3) Establish checkpoints i) at the gate to the docks, ii) at the old Prison, iii) between Lariast's tradehouse and Peladia Varousha's armory, iv) at the Crusader's Valet, v) in front of the courtyard of the Helnim Hall and vi) at the guildhouse of the Guild of Fighters.<BR>\r\n3a) Militia personnel must not pass through checkpoints unless orders in written form explicitly authorize it to do so.<BR>\r\n3b) Civilians must not pass through checkpoints unless they can i) prove their identity, ii) are not known members of the Thieves Guild and iii) are able to state compelling reasons to do so.<BR>\r\n3c) Individuals trying to pass through checkpoints and not covered by points 3a and 3b must be halted and be delivered to Militia personnel ordered in written form to conduct further interrogations.<BR>\r\n4) Enter every building inside the city walls and search for indices of illegal activities.<BR>\r\n4a) Indices of illegal activities must be recorded and delivered to the superior.<BR>\r\n4b) Buildings that have been searched must be marked by the responsible officer.<BR>\r\n4c) Reports to Knight Protector Caedan Jorval must be made every half hour by the responsible officer.<BR>\r\n5) Identify every civilian that You encounter.<BR>\r\n5a) Known members of the Thieves Guild that are identified in so doing must be arrested immediately and be delivered to Militia personnel ordered in written form to conduct further interrogations.<BR>\r\n5b) Civilians unable to prove their identity must be halted and be delivered to Militia personnel ordered in written form to conduct further interrogations.<BR>\r\n5c) Identified civilians that are i) not known members of the Thieves Guild, ii) not suspected of conducting and/or having conducted illegal activities or iii) not suspected of having knowledge of illegal activities must be challenged to return to their homes as quick as possible.<BR>\r\n6) Take known members of the Thieves Guild and other suspects to the Militia Headquarters for further interrogations.<BR>\r\n7) Interrogate known members of the Thieves Guild and other suspects whether they possess further knowledge of members of the Thieves Guild and/or illegal activities.<BR>\r\n8) Imprison known members of the Thieves Guild and other subjects charged with a crime.<BR>\r\n<BR>\r\nSigned<BR>\r\nCaedan Jorval, Knight Protector<BR>\r\n<BR>"
