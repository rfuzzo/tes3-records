text: "<DIV ALIGN=\"Left\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThe Robe of Ebon Regency<BR>\r\n<BR>\r\nAdorned with golden lining and fine ebony jewels, the Robe of Ebon Regency was woven in the halls of the Ebon Tower and gifted to the Raathim family of Morrowind during the early Third Era. The robe was soon acquired by Empress Regent Katariah Raathim, and became a symbol of her enduring reign until her death in 3E 200. The enchantment on the robe was said to have boosted the empress's influence around the empire, and significantly increased her popularity among the people of Tamriel. After her death, the robe was returned to the Ebon Tower and remains here to this day.<BR>\r\n<BR>\r\n"
