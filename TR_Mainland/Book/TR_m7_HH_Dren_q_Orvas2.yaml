text: "<DIV ALIGN=\"Left\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nTo Orvas Dren,<BR>\r\n<BR>\r\nI know you did it. You may deny it, but I know that, even if indirectly, Vedam's death is your fault. Why couldn't you just have a normal relationship with him? He was your brother! You just had to talk to him. But no! Great Orvas Dren is too prideful and arrogant for that. He would not steep that low. I am ashamed of you and what you have become. After what you did, I have no sons anymore.<BR>\r\n<BR>\r\nReleniah Dren<BR>"
