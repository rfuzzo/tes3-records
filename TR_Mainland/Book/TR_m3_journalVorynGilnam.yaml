text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\n[This diary contains the information about the life and criminal activities of Moryn Gilnam.] <BR>\r\n... <BR>\r\nCarmana is gonna drive me nuts! How many times do I have to tell her that we must obtain some jewelry for tomorrow's shipment, not those ponderous weapons! Guess I'll have to do this on my own, as always. What a bunch of sucklings! Alright, Moryn: just this shipment, and you're going to be in Narsis. Just put on this foolish robe you stole from a temple a few days ago and go fishing. \n<BR>\r\nHah, that's how the professionals work! Apparently, that outlander woman has got herself into some real problems with the guards, at least some moral consolation after the hours of talking to that foreign scum. Narsis, here comes your new noble! <BR>\r\n<BR>"
