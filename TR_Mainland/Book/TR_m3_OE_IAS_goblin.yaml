text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThe Goblin Collection<BR> <BR>\r\n<DIV ALIGN=\"CENTER\">\r\nGoblins have been on Nirn since the dawn of time. These items--the shield, the axe and the armor pieces--have been collected from various abandoned caves in the western Velothi Mountains near the Cyrodiil border. The red symbol is an artist's rendition of the emblem of the Grave Maggot tribe -- a clan of migratory goblins suspected to have crossed over to Morrowind.\r\n<BR>"
