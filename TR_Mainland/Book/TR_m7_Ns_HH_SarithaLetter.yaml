text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nTo Fethas Hlaalu, Duke of Narsis<BR><BR>\r\nI hope this finds you well. As you know, the Hlaalu Council Company was founded to safeguard the interests of our Great House and to take advantage of the new opportunities created by the Empire. To assure the success of the company, responsibility over it was placed in the hands of the Grand Council. The conduct of your agents in the Valley of Storms Charter is subverting this authority. They are not in the interest of the House and they must cease. This is not the first time I've had to remind you of your position. I hope it is the last.<BR><BR>\r\nYour cousin, Saritha Hlaalu<BR>"
