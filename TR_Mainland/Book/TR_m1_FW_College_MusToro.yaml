text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nYnesai Toro<BR> <BR>\r\n<DIV ALIGN=\"LEFT\">\r\nA well-preserved example of native Ynesai art. Many such monuments dot the isles of Yneslea, though their cultural significance is unclear. Though made of stone, even a close inspection of the Toro will reveal no trace of hammer or chisel -- a testament to the skill of the sculptor.\r\n<BR>\r\nThis item was discovered on an isle near Craesa by Imperial archaeologist Jera Cerunia in 281, and delivered to Thorn aboard the IAS vessel 'Sungazer'. It was transferred to Firewatch in 389, when it became one of the original pieces in the Museum's Invasion of Akavir collection.<BR>"
