text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThis document grants the ship 'Rivenwake' license to trade at the city of Bal Foyen until the end of 3E%Year. All imported and exported goods are to be taxed by 10 percent of their value, with the exception of liquors, which are subject to additional fees. In the case of misconduct or breach in Imperial law, including but not limited to trade with illegal goods, House Hlaalu may withdraw this license immediately.<BR>\r\n<BR>\r\nUndersigned,<BR>\r\nTerani Deroth<BR>\r\non behalf of Serjo Tholer Andas and Great House Hlaalu <BR>\r\n<BR>"
