  To the %PCRace who set me free,<p>

  Maybe you didn't notice my plan. I left this note on Gweiwen's corpse to explain my actions. With my poisoned dagger, killing her was easy. I just wanted to reach Argonia and settle there without always looking over my shoulder.<p>

