text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nBy the Grace of ALMSIVI, Lords and Rulers of All<BR>\r\n<BR>\r\nKnow all Dunmer by these words that Muthsera Ulmon Vathri has willed his possessions and house in Omaynis to the Temple has bequeathed his estate to the Tribunal Temple. Master Nalvs Andolin will be appointed as caretaker and sole executor of said estate until such a time that it can be liquidated to benefit the charitable mission of the Tribunal Temple in Bal Foyen.<BR>\r\n<BR>\r\nSigned,<BR>\r\nUlmon Vathri<BR>\r\n<BR>\r\nAs witnessed on behalf of the Tribunal Temple by<BR>\r\nMaster Nalvs Andolin<BR>\r\n<BR>"
