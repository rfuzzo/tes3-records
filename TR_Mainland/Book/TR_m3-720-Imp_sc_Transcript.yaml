text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nCitizen Mols Hlarsis v. citizen Alju-Deekus <br>\r\nSecond Day of the Trial<br>\r\n<DIV ALIGN=\"LEFT\">\r\n<br>\r\nBARRISTER ELLERIAN: We have already established that you were indeed attacked and severely injured, citizen Hlarsis. Would you still recognize the assailant? <br>\r\nM. HLARSIS: Yes, yes--of course! He's sitting right over there. <br>\r\nBARRISTER ELLERIAN: Let the scribe's record show that the claimant is pointing towards the defendant. So, citizen Alju-Deekus of Lilmoth is the one who attacked you? <br>\r\nM. HLARSIS: Yes. <br>\r\nBARRISTER ELLERIAN: He's the one who knocked you violently to the ground, correct? <br>\r\nM. HLARSIS: Yes. <br>\r\nBARRISTER ELLERIAN: And repeatedly hit you with a braided whip resulting in severe pain, emotional anguish and the permanent loss of vision in your left eye? <br>\r\nM. HLARSIS: Yes! Yes! <br>\r\nBARRISTER ELLERIAN: And where, I wonder, did he acquire this braided whip? <br>\r\nM. HLARSIS: Err... ahem... <br>\r\nJUSTICE BELISATHA MEDE: Answer the question. <br>\r\nBARRISTER ELLERIAN: No matter, your honor. Let's try another question. How would you describe your relationship with the defendant? <br>\r\nM. HLARSIS: Swollen-Skink worked on my plantation. <br>\r\nBARRISTER ELLERIAN: Please refer to the defendant as either 'the defendant' or by the official transliteration of his name. So, he was a hired farmhand, is that what you mean? <BR>\r\nM. HLARSIS: No, he was a slave. <br>\r\nBARRISTER ELLERIAN: I see. So, would you say that you owned the defendant? That he was your property? <br>\r\nM. HLARSIS: Yes. <br>\r\nBARRISTER ELLERIAN: 'Your property'. 'Your'. That is interesting. Would you be so kind, citizen Hlarsis, as to remind me what you are accusing the defendant of? <br>\r\nM. HLARSIS: Attempted mer-slaughter and assault. <br>\r\nBARRISTER ELLERIAN: Very good. And do you happen to know what the laws of Morrowind, acknowledged by the Imperial Law, state about property assaulting or attempting to slaughter its owner? <br>\r\nM. HLARSIS: I... I don't... <br>\r\nBARRISTER ELLERIAN: Well, you'd better listen closely then, because this'll be relevant to your line of work. The law dictates that should any 'property'--a crazed Guar, perhaps, or an enslaved Argonian yearning for freedom--cause damage to anyone the owner of that 'property' is liable to offer compensation. So, given the fact that at least during the time of the incident the defendant was considered 'your property' there is no case to be made against him. You bear the burden of liability here and you're more than welcome to collect the lawful compensation you seek from yourself. <br>\r\nM. HLARSIS: But... but... he attacked me! There are witnesses! <br>\r\nBARRISTER ELLERIAN: Oh. Well, if that is the truth, then the defendant couldn't possibly be your property, could he? Make up your mind, citizen Hlarsis. Either you acknowledge that the defendant--Alju-Deekus--is a free citizen of the Empire, or you can't legally charge him with anything and this court must rule him innocent of all crimes. <br>\r\nM. HLARSIS: What? Who do you think you are, you western fetcher? You can't trick me out of owning a slave, nor can you keep me from punishing him... [Dark Elven vulgarities] You're dead, Swollen-Skink! Dead, you hear! <br>\r\nJUSTICE BELISATHA MEDE: Order! Order! Enough, citizen Hlarsis, or I will have you jailed. I think this is enough for one day. The court adjourns for now. <br>"
