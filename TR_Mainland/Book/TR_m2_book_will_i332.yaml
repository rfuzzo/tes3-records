text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nI must be brief, for my captor has allowed but a short time to prepare this document. My house has fallen and I, Ivo Salvarys, last of my line, am to be put to the knife in the halls of my ancestors. Our days of glory are long passed, our clan once foremost among our peers has dwindled, and all is now lost. The souls have been disturbed, even driven mad, by my captor and they anguish over the desecration of their home. My death is no doubt calculated  to drive them to even greater depths of sorrow and heights of wrath, though to what twisted purpose I know not.<BR>\r\n<BR>\r\nI have never shown cowardice, not a day in my long life, but reader I bid you to flee this place at once, before it is too late.<BR>\r\n<BR>\r\nThe enemy comes, and my time here is over. Heed my warning, for my end will be neither swift nor painless.<BR>\r\n<BR>\r\nIvo Salvarys<BR>"
