text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\">\r\n<BR>\r\nI have granted many gifts to your chapel. Far more than he. Do you ignore those most reverent to you?<BR>\r\n<BR>\r\nI asked your priest what to make of this. He said to bring honor to you. I have brought honor and much gold. I ask where is my honor?<BR>\r\nIf this ruling passes I will be made a dishonest trader in the eyes of our city. Will you let your most generous of followers be made an outcast?<BR>\r\n<BR>\r\nI didn't know these Dunmer considered it fraud.<BR>"
