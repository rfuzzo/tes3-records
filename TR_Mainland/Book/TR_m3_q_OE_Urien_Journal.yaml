text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR><BR>\r\n[This journal appears to be a log of evenings spent drinking and gambling in various taverns.]\r\n<DIV ALIGN=\"LEFT\">\r\n<BR>\r\nTonight I intend to partake of all Old Ebonheart has to offer. At the very least I will be sharing a drink with the fine folks down in the Empress Katariah.\r\n<BR><BR>\r\nNaamalvu threw us out because we were \"too rowdy\". I suggested going to the Salty Futtocks, but my companions insisted on the Moth and Tiger.\r\n<BR>\r\n"
