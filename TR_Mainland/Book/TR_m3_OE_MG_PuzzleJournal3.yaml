text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nPotelie Sincel's Log - Bedroom<BR>\r\n<BR>\r\n<DIV ALIGN=\"LEFT\"><BR>\r\nEntry 1<BR>\r\nWhat in Oblivion happened here? This bedroom is a mess. Oh well, I'll be able to get some sleep in that nice comfy bed.<BR>\r\n<BR>\r\nEntry 2<BR>\r\nI'm almost certain that the bed just tried to bite me! Ugh, I'm so tired.<BR>\r\n<BR>\r\nEntry 3<BR>\r\nNow it stole one of my keys during the night. I swear, if the whole place wasn't made of wood, I would burn that... thing on the spot! Luckily, I had already used that key. I'm not spending another night in this room.<BR>\r\n<BR>"
