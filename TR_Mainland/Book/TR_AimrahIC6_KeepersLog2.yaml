text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nNotes on Dreugh<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nEntry 1<BR>\r\nSince I have to cope with all the visits to my under-neighbors the Dreugh, I might as well see for myself what this is all about.<BR>\r\n<BR>\r\nEntry 2<BR>\r\nThis smell! It is so foreign and strong that some strange fungi appeared here! There are mushrooms that I have never seen anywhere else. I should take some samples and see what their properties are.<BR>\r\n<BR>\r\nEntry 3<BR>\r\nI am intrigued by the strange clusters floating on the surface. The feeble flow of these dark waters made them drift to the walls of the cave. From what I've read in the book Life Cycle of the Dreugh, I suppose these are the \"grom\", the pellets of fibers that Dreugh vomit during the so-called \"meff\". <BR>\r\n<BR>\r\nEntry 4<BR>\r\nI tried to unravel one of the pellets, and I nearly fainted under the assault of the stench! It was ten times worse than the rotting fish and meat and the acrid smell of all those weird shrooms that surround me... In the end, I found nothing interesting in these little balls. <BR>\r\n<BR>\r\nEntry 5<BR>\r\nSometimes, my visitors gather on the platform above, and they just stay there, staring at me weirdly. I've come to realize that this is my cue to leave. So I leave them to... do whatever they do there. <BR>\r\n<BR>\r\nEntry 6 <BR>\r\nI started to make a precise account of the meat and fish that they bring here, and the quantities the Dreugh need. With time, I will find a balance between supply and consumption in hope that nothing will rot and add to the horrible smell... My companions find it funny, but I will try anyway. <BR>\r\n<BR>\r\nEntry 7 <BR>\r\nWell, it is a success! The smell is less overwhelming now, quite bearable.<BR>\r\n<BR>\r\nEntry 8 <BR>\r\nI took a look at their book up there... I was quite surprised to see one of the Sermons of Lord Vivec. Well, even if I worship the Tribunal, I am not one to delve too deeply into this religious stuff. I discarded it to go back to my work.<BR> <BR>\r\nEntry 9 <BR>\r\nYesterday, something happened that scared me. I was sampling some of the weirdest mushrooms of this cave, when all the Dreugh came near the surface. It was a mess of tentacles and pincers, and lots of water being thrown everywhere. They made a ruckus, hissing and clicking and growling. I stepped back worried. Could they climb the stairs and platforms? Could they reach me? Once out of their sight, I ran away.<BR>\r\n<BR>\r\nEntry 10<BR>\r\nThey are speaking! The first thing I did when they got too excited for my liking, was to warn my visitors. They were amused, to say the least. And I felt like a fool to be so worried. They explained that they just settled an argument between them... So all that noise was actually a language! I am so excited! What if we could speak to these creatures, and come to a mutual understanding? That would be the beginning of a new era, where an intelligent aquatic race would take their rightful place in the history of Tamriel!<BR>\r\n<BR>\r\nEntry 11<BR>\r\nOn the other hand, I witnessed some disturbing behaviors on their part. When one of them starts the transition -- the \"meff\" -- and unfortunately fails, they just eat it... It is somewhat shocking, and it will be a long way before they enter civilization... <BR>\r\n<BR>\r\nEntry 12<BR>\r\nI caught a few words. Now I am nearly able to talk to them. <BR>\r\n<BR>\r\nEntry 13<BR>\r\nWell, they are very basic creatures, with very basic needs, like food, food, and food. But sometimes they talk about a great cavern, a place where they have to return to pay their respects to their leader, a king of sort. I wonder if this king is the famous Ruddy Man. Probably one of his heirs. <BR>\r\n<BR>\r\nEntry 14<BR>\r\nI had more \"discussions\" with the Dreughs. Well, if I'm honest, I overheard more conversations... It seems that the great cavern and its inhabitant are located in a very deep abyss, far to the south. Could it be the Paruddma's Maw that the denizens of Aimrah are talking about with a great level of fear? <BR>\r\n<BR>\r\nEntry 15<BR>\r\nI spoke to my visitors, about the great cavern, the king of dreugh, and I also mentioned Paruddma's Maw... Maybe I shouldn't have. They sent weird looks my way... <BR>\r\n<BR>"
