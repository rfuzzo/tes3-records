text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nFragmentary Manuscripts of the Saturniidae Library\r\n<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nIn 3E 387 the Saturniidae Library at the Temple of the Ancestor Moth in Cyrodiil was demolished. This was a library in name only. The bulk of the volumes of the small and damp structure had long been moved to the Temple's main library three centuries previous. The structure was largely ignored until renovations at the Temple slated the structure for demolition, and available documentation records no librarian after 3E 102. In preparation for the demolition, a number of damaged manuscripts were found in situ. More interestingly, some were also found in a small, bricked-up alcove. When and why these texts were secured in this manner is unknown. Several theories have surfaced based on the contents of the surviving texts, but only a fraction of those in the niche survived and thus a representation of the whole is not possible.<BR>\r\n<BR>\r\nCenturies of neglect, damp conditions, and the presence of insects has made the state of the surviving texts perilous. Few have more than a dozen readable folios, and those that are readable can only be done so with difficulty. Most of these texts are known, but not all, and a few have interesting variants. This catalogue has been published with the goal of making scholars aware of what was found. A full diplomatic edition will follow in the future to preserve this find.<BR>\r\n<BR>\r\nCodex Y. I. 13. <BR>\r\n1 (ff. 1-6v). 2920, First Seed. Carlovac Townway. <br>\r\n2 (ff. 180-1). 2920, Hearth Fire. Carlovac Townway. <br>\r\n3 (ff. 245-6v). Chronicles of the Five Companions, vol. 7. <br>\r\nOnly these leaves remain in the bound leather codex, the rest having been ripped out quite carefully. The surviving sheets are blackened with mildew. The text is written in an attractive Antiochan hand by a single scribe upon parchment sheets, perhaps suggesting it was put together under the Potentate. Together with large margins this suggests that this was at one time a very expensive volume. <br>\r\n<BR>\r\nFragment 1 <br>\r\nHalf a folio. Parchment. The recto contains writing in an elegant Altmeri hand normally dated to the Second Era. Stitch marks on the left of the recto indicates that this was a part of a codex. Few words are legible, but the first line clearly reads \"...participate in re-enactments of the deeds of Sload...\" <br> <br>\r\nFragment 2 <br>\r\nTwo folios. Paper. In an unremarkable Second Era hand. Appears to be a copy of the \"Nine Commands of the Eight Divines\". <br> <br>\r\nCodex Y. I. 76 <br>\r\n1 (ff. 1-156). A small paper codex that is largely undamaged. It contains a single work written in a standard Second Era Nibenese hand. The text is a lengthy prose account of Topal the Pilot's voyage up the Niben, but contains such absurdities that it can scarcely be said to have any historical value. However, extensive marginal notes in a cursive hand suggest that someone was taking a serious interest in it. <br> <br>\r\nFragment 3 <br>\r\nSingle folio. Paper. In a messy hand, probably from the early Third Era. Contains a list of names and book titles. <br> <br>\r\nCodex Y. I. 164 <br>\r\n1 (ff. 103-12v). The intact proem labels this play \"Dibella and the Hermit\". <br>\r\n2 (ff. 145-77). Commentary on Albicius Grenthen's \"Mercy of Stendarr\". <br>\r\n3 (f. ?). Leaflet supporting the cult of Dibella in Sentinel. <br>\nDamaged parchment codex of Third Era provenience. <br> <br>\r\nCodex Y. I. 179 <br>\r\nDamaged paper codex containing 44 folios of Ancestor Moth rules. <br> <br>\r\nFragment 4 <br>\r\nThree folios in a clear Nibenese hand from the Third Era. Contains Dunmer religious works. <br> <br>\r\nFragment 5 <br>\r\nSingle folio. Found inside the otherwise destroyed Codex Y. I. 31. Parchment. Ayleidic writing covering both recto and verso. In a very fragile condition. <br> <br>\r\nFragment 6 <br>\r\nTwo folios. Paper. Apparently a treatise for affixing seals to letters. <br>"
