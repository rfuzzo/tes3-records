text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\n[This sheet of paper is filled with notes in preparation of the Verturius inquest. The inquest was initiated by Sirius Cinna, who was the commanding officer of Vibius Verturius while stationed at Fort Ancylis. Cinna wants Verturius honorable discharge from the Legion turned into a dishonorable one, because Cinna blames Verturius for the failed attempt to retake the Saros archipelago from undead forces.]<BR>\r\n"
