text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThe Thirty-Six Lessons of Vivec: Sermon Thirty-One<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nMany more years passed in Resdaynia, and the high priests of the Dwemer were almost ready to make war on the rulers of Veloth. The Hortator had become the husband of Ayem during this time, and the first saint of the Triune way. Vivec had tired of fighting his sons and daughters, and so took a respite from trying to find them.<BR>\r\n<BR>\r\nThe Hortator said to his wife, 'Where is Vivec, my teacher? I love him still, though he grows cold. His lamentations, if I may call them that, have changed the skin of the whole country. He is hardly to be found anywhere in Veloth of late. The people grow dark because of it.'<BR>\r\n<BR>\r\nAnd Ayem took mercy on her troubled husband and told him that the sword of the Triune had been fighting minor monsters stirred up by the Dwemer as they worked on their brass siege machines. She took the Hortator inside her and showed him where his master was.<BR>\r\nALMSIVI, or at least that aspect that chose to be Vivec, sat in the Litany Hall of the False Thinking Temple after his battle with the Flute-and-Pipe Ogres of the West Gash. He began writing, again, in his Book of Hours. He had to put on his Water Face first. That way he could separate the bronze of the Old Temple from the blue of the New and write with happiness. Second, he had to take another feather from the Big Moon, further rendering it dead. That way he could write about mortals with truth. Third, he recalled the Pomegranate Banquet, where he was forced to marry to Molag Bal with wet scriptures to cement his likeness as Mephala and write with black hands. He wrote:<BR>\r\n<BR>\r\nThe last time I heard his voice, showing the slightest sign of impatience, I learned to control myself and submit to the will of others. Afterwards, I dared to take on the sacred fire and realized there was no equilibrium with the ET'ADA. They were liars, lost roots, and the most I can do is to be an interpreter into the rational. Even that fails the needs of the people. I sit on the mercy seat and pass judgment, the waking state, and the phase aspect of the innate urge. Only here can I doubt, in this book, written in water, broadened to include evil.<BR>\r\n<BR>\r\nThen Vivec threw his ink on this passage to cover it up (for the lay reader) and wrote instead:<BR>\r\n<BR>\r\nFind me in the blackened paper, unarmored, in final scenery. Truth is like my husband: instructed to smash, filled with procedure and noise, hammering, weighty, heaviness made schematic, lessons learned only by a mace. Let those that hear me then be buffeted, and let some die in the ash from the striking. Let those that find him find him murdered by illumination, pummeled like a traitorous house, because, if an hour is golden, then immortal I am a secret code. I am the partaker of the Doom Drum, chosen of all those that dwell in the middle world to wear this crown, which reverberates with truth, and I am the mangling messiah.<BR>\r\n<BR>\r\nThe ending of the words is ALMSIVI.<BR>\r\n"
