text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nWELL-BELOVED PEOPLE OF MORROWIND!<BR>\r\nTAKE HEED!<BR>\r\nTAKE WARNING!<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nThe outlaw named %PCName, stated trade of %PCClass, lately called 'Incarnate' and 'Nerevarine,' now is shown to the investigating Ordinators and Magistrates of this district to be an agent in the pay of the Imperial Intelligence Service. This outlaw's claims are false. The prophecies this outlaw cites are discredited. The dishonest character and base purposes of the outlaw in perpetrating this hoax are now made clear to all observers. %PCName is sought for various crimes by Ordinators and town guards. Report all encounters with this outlaw to the proper authorities. If you see this outlaw in public, give the alarm.<BR>\r\n<BR>\r\nPublished by the authority of the Temple, the Order of the Watch, Magistrates of Vvardenfel District, under the signature and authority of Grandmaster Berel Sala, Captain of the Watch. Hear and Heed!<BR>\r\n"
