text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nGalen,<BR>\r\n<BR>\r\nI am passing along orders from Therana that two crates of steel armor be delivered to the tower before nightfall. She doesn't care how or where you get them, just have them there as soon as you can. Therana is very irritable and prone to rashness lately with all the rumors of the impending siege by Trerayna, and I would strongly advise you not to become a source of further irritation by failing this duty. You will be compensated for your efforts of course.<BR>\r\n<BR>\r\nMollismo<BR>\r\n"
