text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nAshlands Hymns<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\n[This is a volume of folk verses collected from Ashlanders. 'Wondrous Love' is from the Urshilaku Ashlanders of the northern Ashlands.]<BR>\r\n<BR>\r\nWhat a wondrous love it is<BR>\r\nTo bind two souls in faith,<BR>\r\nChained completely together<BR>\r\nWith never a false word,<BR>\r\nWeal and woe, wish and real,<BR>\r\nWoven each together<BR>\r\nFrom first kiss to last breath,<BR>\r\nFirst and last whispered in love.<BR>\r\n<BR>\r\n"
