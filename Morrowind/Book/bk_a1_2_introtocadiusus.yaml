text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nDearest Senilias,<BR>\r\n<BR>\r\nThe bearer of this note, %PCName, has provided useful service, and shown considerable resourcefulness. I have employed %PCName in retrieving an item from Arkngthand, so you can count on some familiarity with Dwemer ruins. If you have a place, I believe %PCName will give satisfaction.<BR>\r\n<BR>\r\nIf you have any luck, perhaps you'll use the bearer to send a note my way.<BR>\r\n<BR>\r\nMy best regards and affection to you and Pania,<BR>\r\nHasphat Antabolis<BR>\r\n"
