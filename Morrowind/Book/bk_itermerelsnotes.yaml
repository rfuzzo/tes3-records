text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nNotes on the Persistence of Oblivion Streams<BR>\r\nby Itermerel<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nThe variable flow of daedrons in Oblivion streams can have profound effects on the magicka potential of various locations. Magicka use often causes effects on the streams themselves. By reconfiguring the polarity of the daedron fields, it is possible to manipulate and trace the streams in the following cases...<BR>\r\n<BR>\r\n[The notes go on about this subject for some time.]<BR>\r\n"
