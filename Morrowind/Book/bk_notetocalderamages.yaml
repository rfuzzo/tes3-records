text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nMages:<BR>\r\n<BR>\r\nPlease be judicious in your use of fire spells while guarding slaves deep in the mine. Often flammable gases are present and, as last week's incident indicates, even a small flame can spark a huge explosion. We don't know if Keseena will ever get that patch of fur back.<BR>\r\n<BR>\r\nStlennius<BR>\r\n<BR>\r\n"
