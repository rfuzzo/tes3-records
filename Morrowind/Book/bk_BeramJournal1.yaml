text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nToday we finally finished hewing out the two main jail rooms and all six cells, and almost as if in response to our celebration, several of those damned roots grew through the wall and took out two of our cells. I wonder constantly what those wizards could be up to up there in the tower, but I guess this is the nature of working for the Telvanni. I will inform them again of our construction plans (which THEY provided to us) and request that they refrain from such actions in the future. In the meantime, my men have begun setting up the necessary ramps and equipment to begin work on the next section of dungeon. Here's hoping it goes better than the first.<BR>\r\n<BR>\r\nBeram<BR>\r\nForeman<BR>\r\n"
