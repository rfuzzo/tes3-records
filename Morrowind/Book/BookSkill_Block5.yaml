text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThe Thirty-Six Lessons of Vivec: Sermon Thirty-Two<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nThe Scripture of the Mace, First:<BR>\r\n<BR>\r\n'The pleasure of annihilation is the pleasure of disappearing into the unreal. All those that would challenge the sleeping world will seek membership in this movement. I denounce the alienation of the Cloven Duality with a hammer.'<BR>\r\n<BR>\r\nSecond:<BR>\r\n<BR>\r\n'Take from me the lessons as a punishment for being mortal. To be made of dirt is to be treated as such by your jailers. This is the key and the lock of the Daedra. Why do you think they escaped the compromise?'<BR>\r\n<BR>\r\nThird:<BR>\r\n<BR>\r\n'Velothi, your skin has become the pregnant darkness. My brooding has brought this on. Remember that Boethiah asked you to become the color of bruise. How else to show yourselves people of the exodus into the vital: pain?'<BR>\r\n<BR>\r\nFourth:<BR>\r\n<BR>\r\n'The sage who is not an anvil: a conventional sentence and nothing more. By which I mean dead, the fourth walking way.'<BR>\r\n<BR>\r\nFifth:<BR>\r\n<BR>\r\n'A proper comprehension of the virtues: stage-managed and to be murdered.'<BR>\r\n<BR>\r\nSixth: <BR>\r\n<BR>\r\n'In the end, rejoice as a hostage released from drumming torment but that savors his wound. The drum breaks and you find it to be a nest of hornets, which is to say: your sleep is over.'<BR>\r\n<BR>\r\nSeventh:<BR>\r\n<BR>\r\n'The suspicious is spectacle and the lie is only a theoretical inspiration.'<BR>\r\n<BR>\r\nEighth:<BR>\r\n<BR>\r\n'But then why, you ask, do the Daedra wish to meddle with the Aurbis? It is because they are the radical critique, essential as all martyrs. That some are more evil than others in not an illusion. Or rather, it is a necessary illusion.'<BR>\r\n<BR>\r\nThe ending of the words is ALMSIVI.<BR>\r\n"
