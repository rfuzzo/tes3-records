text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nBoethiah's Glory<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nLook upon the face of Boethiah and wonder. Raise your arms that Boethiah may look on them and bestow a blessing. Know that battle is a blessing. Know that death is an eventuality. Know that you are dust in the eyes of Boethiah.<BR>\r\n<BR>\r\nLong is the arm of Boethiah, and swift is the blade.<BR>\r\n<BR>\r\nDeep is the cut, and subtle is the poison.<BR>\r\n<BR>\r\nWorship, o faithful. Pray your death is short.<BR>\r\n<BR>\r\nWorship, o faithful. Pray your death is quiet.<BR>\r\n<BR>\r\nWorship, o faithful. Worship the glory that is Boethiah.<BR>\r\n<BR>\r\n<DIV ALIGN=\"CENTER\"><BR>\r\n<IMG SRC=\"Boethiah_256.tga\" WIDTH=\"240\" HEIGHT=\"240\"><BR>\r\n<DIV ALIGN=\"LEFT\"><BR>\r\n<BR>\r\n<BR>\r\n<BR>\r\nInto battle strides the Daedra Prince, blade at the ready to cleave the unworthy.<BR>\r\n<BR>\r\n"
