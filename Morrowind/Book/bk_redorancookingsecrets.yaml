text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nRedoran Cooking Secrets<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\nCrab Meat and Scuttle<BR>\r\n<BR>\r\n2 handfuls of scuttle<BR>\r\n4 pinches of wickwheat<BR>\r\n1 large kwama egg<BR>\r\nthe meat of one mudcrab (two portions)<BR>\r\n1 handful of chopped bittergreen<BR>\r\n<BR>\r\nBeat eggs, wickwheat, and scuttle in a large bowl. Slowly stir in crabmeat and bittergreen. Bake covered in a hot over for one half hour to one hour (when a knife comes out clean).<BR>\r\n<BR>\r\nThe Hound and Rat<BR>\r\n<BR>\r\n1 pie crust<BR>\r\n1 pound of ground meat (mixed rat and hound)<BR>\r\na hand and a half of cooked saltrice<BR>\r\n1 handful of scuttle<BR>\r\n1 small kwama egg<BR>\r\na pinch of ash salts<BR>\r\n<BR>\r\nCook the mixed meat in a pan over an open flame. When the meat begins to brown, add the saltrice. Stir for a few moments and add the scuttle and kwama egg. When the kwama egg is fully cooked and the scuttle has melted, pour from the pan into the pie crust. Sprinkle with ash salts and cover the pie crust. Bake for one quarter hour in a hot oven.<BR>\r\n<BR>\r\n"
