text: "<DIV ALIGN=\"CENTER\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nVampires of Vvardenfell<BR>\r\nVolume I<BR><BR>\r\n<DIV ALIGN=\"LEFT\"><BR><BR>\r\n[excerpts]<BR>\r\n<BR>\r\n...The violent antipathy of Morrowind culture toward necromancy ensures that vampires are virtually unknown in Morrowind...<BR>\r\n<BR>\r\n...The Temple does not acknowledge the existence of Western vampire hunting orders. Nonetheless, interviews with Temple officials persuade me that the Dunmer of Morrowind are experienced and knowledgeable in the handling of these menaces. On the other hand, they freely admit that even a large community of vampires might easily escape detection in the remote wastelands, or in the subterranean labyrinths of abandoned strongholds and wizard towers....<BR>\r\n<BR>\r\n...The \"ash vampire\" of Ashlander legend is not undead. Sorceries and blessings affecting the undead reportedly have no effect on these creatures. No specimen has ever been examined, and no references have ever linked these legends with the known clans of Tamrielic vampires....<BR>\r\n<BR>\r\n...Vvardenfell's three known bloodlines differ greatly in their approach to prey. The Quarra bloodline features exceptional strength and endurance, and attacks in a state of ecstatic frenzy. Aundae vampires are potent spellcasters, seeking to hypnotize victims before feeding, while the swift and agile Berne clan vampires prefer stealth and ambush, first poisoning the victim with a bite, then withdrawing to a safe distance, returning to feed only when the prey has weakened...<BR>\r\n<BR>\r\n...It is supposed that vampirism is contracted from wounds received from a vampire. Since few victims survive vampiric attacks or feedings, the process of contracting the disease is little understood. Some have suggested that victims may willingly submit themselves to the will of a vampire, but no real evidence of this exists....<BR>\r\n<BR>\r\n...During the incubation phase, lasting up to 72 hours, the vampirism disease exhibits no symptoms, and may be cured by general spellcraft or cult blessings. However, during incubation, some victims have reported sleep disturbances and troubling dreams. After symptoms are exhibited, however, the disease is incurable and irreversible....<BR>\r\n<BR>\r\n"
