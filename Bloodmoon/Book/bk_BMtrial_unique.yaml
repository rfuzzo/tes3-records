text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nDearest Risi,<BR>\r\n<BR>\r\nWhy will you not see me? You know how I feel, and I know you feel the same about me. Please, simply consent to speak to me. Just a word, a moment with you, would ease my soul. If I cannot be with you, I will have to resort to something drastic.\r\n<BR>\r\nPlease, consider your feelings. Your husband is a lout, away for weeks at a time, with no consideration for your needs. I have always been there for you, and I always will be. We should be together, dear Risi.<BR>\r\nRH<BR>\r\n<BR>\r\n"
