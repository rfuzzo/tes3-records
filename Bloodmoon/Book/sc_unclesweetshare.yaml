text: "<DIV ALIGN=\"LEFT\"><FONT COLOR=\"000000\" SIZE=\"3\" FACE=\"Magic Cards\"><BR>\r\nThe Song of Uncle Sweetshare<br>\r\n<br>\r\nHe he!  Ha ho!<br>\r\nTo the workshop he will go!<br>\r\n<br>\r\nMy Uncle's candy is so sweet! \r\nIt's such a yummy winter's treat!<br>\r\nWhen the sugar is warmed by the pale hearth light<br>\r\nThe happiness spreads throughout the night!<br>\r\n<br>\r\nHe he!  Ha ho!<br>\r\nTo the workshop he will go!<br>\r\n<br>\r\nUncle Sweetshare is coming near<br>\r\nTo spread his candy and his cheer!<br>\r\nIt's better than trinkets, games or toys<br>\r\nSo say all the little girls and boys!<br>\r\n<br>\r\nHe he!  Ha ho!<br>\r\nTo the workshop he will go!<br>\r\n<br>\r\nCandy, candy -- he makes so much!<br>\r\nUncle Sweetshare has a magic touch!<br>\r\nSo it's back to the workshop in the snow!<br>\r\nWith lovely lanterns all aglow!<br>\r\n<br>\r\nHe he!  Ha ho!  He he he ha ha ho!<br>\r\n<br>\r\n"
